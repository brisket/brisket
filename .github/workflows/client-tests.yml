name: Client Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  client-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Run client tests
        run: npm run client-tests
